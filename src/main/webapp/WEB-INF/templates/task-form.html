<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"

>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/task/form" th:object="${taskItem}" method="post">
    <label for="id">ID</label>
    <input type="text" name="id" id="id" placeholder="Nhập ID">
    <p th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></p>

    <label for="title">Title</label>
    <input type="text" name="title" id="title" placeholder="Nhập tiêu đề">
    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

    <label for="deadline">Deadline</label>
    <input type="date" name="deadline" id="deadline" placeholder="Nhập deadline">
    <p th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></p>

    <label for="priority">Mức độ ưu tiên</label>
    <input type="text" name="priority" id="priority" placeholder="Nhập mức độ ưu tiên">
    <p th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>

    <button type="submit">Submit</button>
</form>
</body>
</html>
